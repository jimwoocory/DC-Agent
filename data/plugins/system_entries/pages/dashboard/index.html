<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>系统入口 · DC-Agent</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f7f8fb;
      --card: #fff;
      --border: #e4e7ec;
      --muted: #6b7280;
      --accent: #2563eb;
      --green: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --border: #334155;
        --muted: #94a3b8;
        --accent: #60a5fa;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC',
                   'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: inherit;
    }
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    h1 { font-size: 22px; margin: 0; }
    .meta { color: var(--muted); font-size: 13px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
      transition: box-shadow .15s, transform .15s;
    }
    .card.alive { cursor: pointer; }
    .card.alive:hover {
      box-shadow: 0 4px 12px rgba(0,0,0,.08);
      transform: translateY(-1px);
    }
    .card.dead { opacity: 0.62; }
    .card.no-url { cursor: default; }
    .row1 {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .icon { font-size: 24px; }
    .name { font-size: 17px; font-weight: 600; flex: 1; }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--muted);
    }
    .dot.alive { background: var(--green); box-shadow: 0 0 0 3px rgba(16,185,129,.18); }
    .dot.dead  { background: var(--red); }
    .row2 {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.5;
    }
    .url {
      margin-top: 8px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 12px;
      color: var(--accent);
      word-break: break-all;
    }
    .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      padding: 6px 12px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--card);
      color: inherit;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .btn.primary:hover { background: #1d4ed8; color: white; }
    .empty, .err {
      grid-column: 1 / -1;
      padding: 24px;
      text-align: center;
      color: var(--muted);
    }
    .err { color: #991b1b; background: #fee2e2; border-radius: 8px; }
  </style>
  <!-- AstrBot serves this HTML through a rewriter that auto-injects asset_token
       into <script src="/api/plugin/page/bridge-sdk.js">. Just write the static
       tag — the server will rewrite it on the way out. -->
  <script src="/api/plugin/page/bridge-sdk.js"></script>
</head>
<body>
  <header>
    <div>
      <h1>系统入口</h1>
      <div class="meta" id="meta">加载中…</div>
    </div>
    <button class="btn" id="refresh">🔄 立即刷新</button>
  </header>

  <div id="grid" class="grid">
    <div class="empty">加载中…</div>
  </div>

  <script>
    const bridge = window.AstrBotPluginPage;
    const $grid = document.getElementById('grid');
    const $meta = document.getElementById('meta');
    const $refresh = document.getElementById('refresh');

    function fmtTime(unix) {
      try { return new Date(unix * 1000).toLocaleTimeString('zh-CN', { hour12: false }); }
      catch (_) { return '?'; }
    }
    function esc(s) {
      return String(s ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
      })[c]);
    }
    function browserLocalUrl(url) {
      if (!url) return '';
      try {
        const parsed = new URL(url, window.location.href);
        if (
          (parsed.hostname === '127.0.0.1' || parsed.hostname === '::1') &&
          ['localhost', '127.0.0.1', '::1'].includes(window.location.hostname)
        ) {
          parsed.hostname = window.location.hostname;
        }
        return parsed.href;
      } catch (_) {
        return url;
      }
    }

    async function load() {
      try {
        // bridge.apiGet 已经 unwrap 了 `.data.data`（见 PluginPagePage 的 oe()），
        // 直接返我们 plugin 在 _api_status 里塞进 "data" 字段的内容。
        const resp = await bridge.apiGet('status');
        if (!resp) {
          $grid.innerHTML = `<div class="err">加载失败：空响应</div>`;
          return;
        }
        const entries = resp.entries || [];
        const t = resp.updated_at_unix;
        $meta.textContent = `${entries.length} 个服务 · 探测于 ${fmtTime(t)}`;

        $grid.innerHTML = entries.map((e) => {
          const alive = !!e.alive;
          const hasUrl = !!e.url;
          const hasKick = !!e.on_demand_kick;
          const url = browserLocalUrl(e.url);
          const kickUrl = browserLocalUrl(e.on_demand_kick);
          const cardClasses = ['card', alive ? 'alive' : 'dead', hasUrl ? '' : 'no-url']
            .filter(Boolean).join(' ');

          const actions = [];
          if (hasUrl && alive) {
            actions.push(
              `<a class="btn primary" href="${esc(url)}" target="_blank" rel="noopener">打开</a>`
            );
          }
          if (hasKick && !alive) {
            actions.push(
              `<a class="btn primary" href="${esc(kickUrl)}" target="_blank" rel="noopener">⚡ 唤醒并打开</a>`
            );
          }
          if (hasUrl && !alive && !hasKick) {
            actions.push(
              `<a class="btn" href="${esc(url)}" target="_blank" rel="noopener">尝试打开</a>`
            );
          }

          return `
            <div class="${cardClasses}">
              <div class="row1">
                <span class="icon">${esc(e.icon || '⚙️')}</span>
                <span class="name">${esc(e.name)}</span>
                <span class="dot ${alive ? 'alive' : 'dead'}" title="${alive ? '在线' : '离线'}"></span>
              </div>
              <div class="row2">${esc(e.hint || '')}</div>
              ${hasUrl ? `<div class="url">${esc(url)}</div>` : '<div class="url">（无 UI · 仅探活）</div>'}
              ${actions.length ? `<div class="actions">${actions.join('')}</div>` : ''}
            </div>
          `;
        }).join('');
      } catch (e) {
        $grid.innerHTML = `<div class="err">加载失败：${esc(e?.message || e)}</div>`;
      }
    }

    $refresh.addEventListener('click', load);
    (async () => {
      try {
        await bridge.ready();
        await load();
        // 5s 轮询
        setInterval(load, 5000);
      } catch (e) {
        $grid.innerHTML = `<div class="err">bridge 初始化失败：${esc(e?.message || e)}</div>`;
      }
    })();
  </script>
</body>
</html>
